<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AtiQuestion | Banco de Questões</title>
    <link rel="stylesheet" href="style.css">
    <script src="questoes_1.js"></script>
</head>
<body>
    <nav class="navbar">
        <h1>AtiQuestion</h1>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a href="../index.html">Voltar ao Cérebro de Átila🧠</a>
            <a href="atiquestion.html">Página Inicial</a>
            <a href="banco.html">Banco de Questões</a>
            <a href="simulado.html">Simulador</a>
            
            <label class="theme-toggle-btn" style="margin-left: 20px;">
                <input type="checkbox" id="dark-mode-checkbox" onchange="toggleTheme()">
                <span class="theme-toggle-content" id="texto-botao-tema">🌙 Modo Escuro</span>
            </label>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Filtre suas questões</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Especialidade</label>
                    <select id="filtro-especialidade" onchange="adicionarTag('especialidade', this.value)">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Tema</label>
                    <select id="filtro-tema" onchange="adicionarTag('tema', this.value)">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 150px;">
                    <label>Prova</label>
                    <select id="filtro-prova" onchange="adicionarTag('prova', this.value)">
                        <option value="">Todas</option>
                    </select>
                </div>
            </div>
            
            <div id="tags-filtros" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"></div>
            <div style="margin-bottom: 20px; display: flex; justify-content: flex-end;">
                <label class="toggle-fav-btn">
                    <input type="checkbox" id="filtro-somente-fav" onchange="pesquisarBanco()">
                    <span class="toggle-content">❤️ Apenas meu Caderno de Erros</span>
                </label>
            </div>
            <button onclick="pesquisarBanco()">Pesquisar</button>
        </div>

        <div id="resultados-banco"></div>

        <footer style="text-align: center; margin-top: 40px; padding: 20px; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border-color);">
            Site criado por Átila Paixão com apoio de inteligência artificial Gemini 3.1 Pro . Versão estável 3.0
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
