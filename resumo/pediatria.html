<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediatria - Resumos</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Estilos específicos para a barra de pesquisa mantidos e adaptados */
        .search-box { 
            width: 100%; padding: 15px 15px 15px 45px; border: 2px solid #F48FB1; 
            border-radius: 12px; font-size: 1rem; 
            background: #F48FB1 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 15px center; 
            background-size: 20px; 
            transition: all 0.2s;
        }
        .search-box:focus { outline: none; border-color: #F8BBD0; background-color: #fff; }
        .no-results { display: none; text-align: center; padding: 40px 20px; color: #78909C; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="resumos.html" class="back-btn" style="text-decoration: none;">⬅</a>
        <div class="app-title">Pediatria 🧸</div>
    </header>

    <div class="search-container">
        <input type="text" class="search-box" id="disease-search" placeholder="Buscar resumos de pediatria..." onkeyup="filterDiseases()">
    </div>

    <div class="container" style="padding-top: 5px;">
        <div class="uni-grid" id="disease-list">
            
            <a href="pediatria/alimentacao_infantil.html" class="uni-card" style="--card-color: #F8BBD0;" data-name="alimentacao infantil introducao alimentar desmame dieta leite materno">
                <div class="uni-icon">🍼</div>
                <div class="uni-text">
                    <span class="uni-title">Alimentação</span>
                    <span class="uni-sub">Guia e Desmame</span>
                </div>
            </a>

            <a href="pediatria/dnpm.html" class="uni-card" style="--card-color: #00ACC1;" data-name="dnpm desenvolvimento neuropsicomotor marcos reflexos crianca motor cognitivo">
                <div class="uni-icon">🧠</div>
                <div class="uni-text">
                    <span class="uni-title">DNPM</span>
                    <span class="uni-sub">Marcos e Reflexos</span>
                </div>
            </a>

            <a href="pediatria/resumo_suplementacao.html" class="uni-card" style="--card-color: #F57C00;" data-name="ferro vitaminaA vitaminaD suplementação suplemento">
                <div class="uni-icon">💊</div>
                <div class="uni-text">
                    <span class="uni-title">Suplementação</span>
                    <span class="uni-sub">Indicados pela SBP / MS</span>
                </div>
            </a>

        </div>
        
        <div id="no-results" class="no-results">
            Nenhum resumo encontrado.
        </div>
    </div>

    <script>
        function filterDiseases() {
            const input = document.getElementById('disease-search');
            const filter = input.value.toLowerCase();
            const list = document.getElementById('disease-list');
            const cards = list.getElementsByClassName('uni-card');
            let visibleCount = 0;

            for (let i = 0; i < cards.length; i++) {
                const keywords = cards[i].getAttribute('data-name');
                if (keywords && keywords.includes(filter)) {
                    cards[i].style.display = "flex"; // uni-card usa flexbox
                    visibleCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }
            document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
        }
    </script>

    <footer style="text-align:center; padding:20px; color:#888; font-size:0.8rem; border-top:1px solid #eee; margin-top:40px;">
        Cérebro de Átila (R) 2026. Direitos reservados.<br>
        Código-fonte criado por Átila Paixão.
    </footer>

</body>
</html>
